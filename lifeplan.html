<script type="text/babel" data-presets="react">
const { useState, useMemo } = React;
const { ComposedChart, Area, Line, XAxis, YAxis, CartesianGrid, Tooltip, ReferenceLine, ResponsiveContainer } = Recharts;

// ---------- constants ----------
const END_AGE = 90;
const UNI_BASE = { 国立: 250, 私立文系: 400, 私立理系: 520 };
const UNI_LIVING = { 自宅: 0, 一人暮らし: 400 };
const SCENARIO = { 悲観: -2, 標準: 0, 楽観: 3 };
const CHILDCARE = { birthOutOfPocket: 15, runningMonthly: 4, runningYears: 6 };
const TAX = 0.20315;

function pensionFactor(startAge) {
  if (startAge < 65) return Math.max(0, 1 - 0.004 * (65 - startAge) * 12);
  return 1 + 0.007 * (startAge - 65) * 12;
}

// ---------- model ----------
function simulate(p) {
  const adj = SCENARIO[p.scenario];
  const infl = p.infl / 100;
  const raise = p.raiseRate / 100;
  const uniBase = UNI_BASE[p.uniType] + UNI_LIVING[p.uniLiving];
  const childBorn = p.age + 2;
  const birthMonth = Math.round((childBorn - p.age) * 12);
  const uniCost = uniBase * Math.pow(1 + infl, childBorn + 18 - p.age);
  const totalMonths = (END_AGE - p.age) * 12;
  const m50 = Math.round((50 - p.age) * 12);
  const mRetire = Math.round((p.retireAge - p.age) * 12);
  const hPensionAdj = p.hPension * pensionFactor(p.hPensionAge);
  const wPensionAdj = p.wPension * pensionFactor(p.wPensionAge);

  const accs = [
    { owner: "h", tax: false, bal: p.curNisa / 2, monthly: p.hNisaM, rate: p.hRate, limited: true },
    { owner: "h", tax: true, bal: p.curTax / 2, monthly: p.hTaxM, rate: p.hRate, limited: false },
    { owner: "w", tax: false, bal: p.curNisa / 2, monthly: p.wNisaM, rate: p.wRate, limited: true },
    { owner: "w", tax: true, bal: p.curTax / 2, monthly: p.wTaxM, rate: p.wRate, limited: false },
  ];
  accs.forEach((a) => {
    const base = Math.max(0, a.rate + adj) / 100;
    a.mRate = (a.tax ? base * (1 - TAX) : base) / 12;
  });
  const sumNisa = () => accs.filter((a) => !a.tax).reduce((s, a) => s + a.bal, 0);
  const sumTax = () => accs.filter((a) => a.tax).reduce((s, a) => s + a.bal, 0);

  let cash = p.curCash,
    supra = p.curSupra,
    edu = 0;
  let nisaYear = { h: 0, w: 0 };
  let nisaLife = { h: p.curNisa / 2, w: p.curNisa / 2 };
  let nisaFullAge = { h: null, w: null };
  let eduAt18 = null,
    depletionAge = null;
  let supraDone = p.curSupra >= p.supraGoal;
  let supraAge = supraDone ? p.age : null;
  let cap50 = null,
    capRetire = null,
    cap90 = null;
  let minCashChild = Infinity,
    leaveLoss = 0;
  const data = [];

  for (let m = 0; m <= totalMonths; m++) {
    const age = p.age + m / 12;
    const yrs = Math.floor(age - p.age + 1e-9);
    const inflF = Math.pow(1 + infl, yrs);
    const raiseF = Math.pow(1 + raise, yrs);
    const childAge = age - childBorn;
    const accumulating = age < p.retireAge;

    if (m > 0 && m % 12 === 0) {
      nisaYear.h = 0;
      nisaYear.w = 0;
    }

    accs.forEach((a) => (a.bal *= 1 + a.mRate));

    if (accumulating) {
      // 収入（昇給反映・給与停止年齢で各自ゼロ・育休で妻が減）
      const hActive = age < p.hSalaryStopAge;
      const wActive = age < p.wSalaryStopAge;
      const hSal = hActive ? p.hSalary * raiseF : 0;
      const wSalFull = wActive ? p.wSalary * raiseF : 0;
      let wSal = wSalFull;
      const inLeave = childAge >= 0 && childAge < p.leaveYears;
      if (inLeave && wActive) {
        const repl = childAge < 0.5 ? 0.67 : 0.5;
        wSal = wSalFull * repl;
        leaveLoss += wSalFull - wSal;
      }
      const activeCount = (hActive ? 1 : 0) + (wActive ? 1 : 0);
      const bonus = (p.bonusY / 12) * (activeCount / 2) * raiseF; // 賞与は在職者数で按分
      const income = hSal + wSal + p.sideM * raiseF + bonus;

      // 支出（インフレ反映・育児/出産を含む）
      let expense = (p.fixedM + p.variableM + p.specialY / 12) * inflF;
      if (childAge >= 0 && childAge < CHILDCARE.runningYears) expense += CHILDCARE.runningMonthly * inflF;
      if (m === birthMonth) expense += CHILDCARE.birthOutOfPocket * inflF;

      // 投資（NISA 年間枠＋生涯枠 → 超過は特定へ）
      let investedOut = 0;
      accs.forEach((a) => {
        if (a.limited) {
          const lifeRemain = Math.max(0, p.nisaLifetimeLimit - nisaLife[a.owner]);
          const annRemain = Math.max(0, p.nisaLimit - nisaYear[a.owner]);
          const room = Math.min(lifeRemain, annRemain);
          const into = Math.min(a.monthly, room);
          a.bal += into;
          investedOut += into;
          nisaYear[a.owner] += into;
          nisaLife[a.owner] += into;
          if (nisaFullAge[a.owner] === null && nisaLife[a.owner] >= p.nisaLifetimeLimit - 1e-6)
            nisaFullAge[a.owner] = Math.round(age);
          const overflow = a.monthly - into;
          if (overflow > 0) {
            const lifeBinds = lifeRemain <= annRemain;
            if (lifeBinds || p.autoTransfer === "ON") {
              const t = accs.find((x) => x.owner === a.owner && x.tax);
              if (t) {
                t.bal += overflow;
                investedOut += overflow;
              }
            }
          }
        } else {
          a.bal += a.monthly;
          investedOut += a.monthly;
        }
      });

      // Supra・教育上乗せ
      let supraOut = 0;
      if (!supraDone) {
        const prev = supra;
        supra = Math.min(supra + p.supraM, p.supraGoal);
        supraOut = supra - prev;
        if (supra >= p.supraGoal) {
          supraDone = true;
          supraAge = Math.round(age);
        }
      }
      const eduExtra = childAge >= 0 && childAge < 18 ? p.eduExtraM : 0;

      // 余剰は現金へ（不足は現金から）。給与停止で収入が減れば現金の伸びも止まる。
      cash += income - expense - investedOut - supraOut - eduExtra;
    } else {
      // 取り崩し（生活費−年金、繰上下げ調整後）
      const living = p.annualLiving * inflF;
      let pension = 0;
      if (age >= p.hPensionAge) pension += hPensionAdj;
      if (age >= p.wPensionAge) pension += wPensionAdj;
      let need = Math.max(0, living - pension) / 12;
      if (cash > 0) {
        const t = Math.min(need, cash);
        cash -= t;
        need -= t;
      }
      if (need > 0) {
        const tb = sumTax();
        if (tb > 0) {
          const t = Math.min(need, tb);
          const r = (tb - t) / tb;
          accs.filter((a) => a.tax).forEach((a) => (a.bal *= r));
          need -= t;
        }
      }
      if (need > 0) {
        const nb = sumNisa();
        if (nb > 0) {
          const t = Math.min(need, nb);
          const r = (nb - t) / nb;
          accs.filter((a) => !a.tax).forEach((a) => (a.bal *= r));
          need -= t;
        }
      }
    }

    // 教育スリーブ
    let allowance = 0;
    if (childAge >= 0 && childAge < 3) allowance = 1.5;
    else if (childAge >= 3 && childAge < 18) allowance = 1.0;
    const extra = childAge >= 0 && childAge < 18 ? p.eduExtraM : 0;
    const eg = childAge >= 0 && childAge < 13 ? Math.max(0, p.wRate + adj) / 100 / 12 : 0;
    edu = edu * (1 + eg) + allowance + extra;
    if (eduAt18 === null && childAge >= 18) eduAt18 = edu;
    if (childAge >= 18 && childAge < 22) edu = Math.max(0, edu - uniCost / 48);

    if (childAge >= 0 && childAge < CHILDCARE.runningYears) minCashChild = Math.min(minCashChild, cash);

    const nisaBal = sumNisa(),
      taxBal = sumTax();
    const totalAssets = nisaBal + taxBal + cash;
    if (!accumulating && depletionAge === null && totalAssets <= 0.01) depletionAge = Math.round(age);

    if (m === m50) cap50 = { nisa: nisaBal, tax: taxBal, cash, total: totalAssets };
    if (m === mRetire) capRetire = { nisa: nisaBal, tax: taxBal, cash, total: totalAssets };
    if (m === totalMonths) cap90 = { nisa: nisaBal, tax: taxBal, cash, total: totalAssets };

    if (m % 12 === 0) {
      data.push({
        age: Math.round(age),
        nisa: Math.round(Math.max(0, nisaBal)),
        tax: Math.round(Math.max(0, taxBal)),
        cash: Math.round(Math.max(0, cash)),
        education: Math.round(edu),
      });
    }
  }
  if (eduAt18 === null) eduAt18 = edu;
  if (minCashChild === Infinity) minCashChild = cash;

  // 家計（今日の価値）
  const monthlyIncome = p.hSalary + p.wSalary + p.sideM;
  const annualIncome = monthlyIncome * 12 + p.bonusY;
  const monthlyExpense = p.fixedM + p.variableM;
  const annualExpense = monthlyExpense * 12 + p.specialY;
  const monthlyNet = monthlyIncome - monthlyExpense;
  const annualNet = annualIncome - annualExpense;
  const savingRate = annualIncome > 0 ? annualNet / annualIncome : 0;
  const monthlyInvest = p.hNisaM + p.hTaxM + p.wNisaM + p.wTaxM + p.supraM;
  const monthlyToCash = monthlyNet - monthlyInvest;
  const netWorthNow = p.curNisa + p.curTax + p.curCash + p.curSupra - p.debt;

  const ccF = Math.pow(1 + infl, 2);
  const runningTotal = CHILDCARE.runningMonthly * 12 * CHILDCARE.runningYears * ccF;
  const realAssets50 = (cap50 ? cap50.total : 0) / Math.pow(1 + infl, Math.max(0, 50 - p.age));
  const curInvestTotal = p.curNisa + p.curTax;
  const nisaPctNow = curInvestTotal > 0 ? (p.curNisa / curInvestTotal) * 100 : 0;

  return {
    data,
    uniCost,
    eduAt18,
    eduGap: eduAt18 - uniCost,
    cap50,
    capRetire,
    cap90,
    assets50: cap50 ? cap50.total : 0,
    realAssets50,
    depletionAge,
    balance90: cap90 ? cap90.total : 0,
    supraAge,
    supraDone,
    supraPct: Math.min(100, (p.curSupra / p.supraGoal) * 100),
    monthlyNet,
    annualNet,
    savingRate,
    monthlyToCash,
    netWorthNow,
    nisaPctNow,
    runningTotal,
    leaveLoss,
    minCashChild,
    hPensionAdj,
    wPensionAdj,
    nisaFullAgeH: nisaFullAge.h,
    nisaFullAgeW: nisaFullAge.w,
    hEff: Math.max(0, p.hRate + adj),
    wEff: Math.max(0, p.wRate + adj),
    taxEff: Math.max(0, p.hRate + adj) * (1 - TAX),
  };
}

function fmtMan(v) {
  v = Math.round(v);
  const neg = v < 0;
  v = Math.abs(v);
  let s;
  if (v >= 10000) {
    const oku = Math.floor(v / 10000);
    const man = v % 10000;
    s = man > 0 ? `${oku}億${man.toLocaleString()}万` : `${oku}億`;
  } else {
    s = `${v.toLocaleString()}万`;
  }
  return (neg ? "−" : "") + s;
}

// ---------- atoms ----------
function Slider({ label, value, onChange, min, max, step, suffix, accent, valueColor }) {
  return (
    <div>
      <div className="flex items-baseline justify-between mb-1">
        <span className="text-[13px] text-slate-600">{label}</span>
        <span className={`text-sm font-bold tabular-nums ${valueColor}`}>
          {value}
          {suffix}
        </span>
      </div>
      <input type="range" min={min} max={max} step={step} value={value} onChange={(e) => onChange(parseFloat(e.target.value))} className={`w-full cursor-pointer ${accent}`} />
    </div>
  );
}

function NumberField({ label, value, onChange, suffix = "万円", step = 1 }) {
  return (
    <div className="flex items-center justify-between gap-3">
      <span className="text-[13px] text-slate-600">{label}</span>
      <div className="flex items-center gap-1.5">
        <input
          type="number"
          value={value}
          step={step}
          min={0}
          onChange={(e) => onChange(e.target.value === "" ? 0 : Math.max(0, parseFloat(e.target.value)))}
          className="w-20 rounded-lg border border-slate-200 bg-slate-50 px-2 py-1 text-right text-sm font-semibold tabular-nums text-slate-800 focus:border-indigo-400 focus:outline-none"
        />
        <span className="w-8 text-[11px] text-slate-400">{suffix}</span>
      </div>
    </div>
  );
}

function Segmented({ options, value, onChange }) {
  return (
    <div className="flex gap-1 rounded-xl bg-slate-100 p-1">
      {options.map((o) => (
        <button
          key={o}
          onClick={() => onChange(o)}
          className={`flex-1 rounded-lg py-1.5 text-[13px] transition focus:outline-none focus-visible:ring-2 focus-visible:ring-slate-400 ${
            value === o ? "bg-white font-semibold text-slate-900 shadow-sm" : "text-slate-500 hover:text-slate-700"
          }`}
        >
          {o}
        </button>
      ))}
    </div>
  );
}

function Dot({ color }) {
  return <span className="inline-block h-2.5 w-2.5 rounded-full" style={{ background: color }} />;
}

function ChartTooltip({ active, payload, label }) {
  if (!active || !payload || !payload.length) return null;
  const get = (k) => {
    const x = payload.find((p) => p.dataKey === k);
    return x ? x.value : 0;
  };
  const nisa = get("nisa"),
    tax = get("tax"),
    cash = get("cash"),
    e = get("education");
  const Row = ({ c, name, val }) => (
    <div className="flex items-center justify-between gap-5">
      <span className="flex items-center gap-1.5">
        <span className="h-2 w-2 rounded-full" style={{ background: c }} />
        <span className="text-slate-500">{name}</span>
      </span>
      <span className="font-semibold tabular-nums text-slate-800">{fmtMan(val)}円</span>
    </div>
  );
  return (
    <div className="rounded-xl border border-slate-200 bg-white/95 px-3 py-2 text-xs shadow-lg backdrop-blur">
      <div className="mb-1.5 font-bold text-slate-900">{label}歳</div>
      <div className="mb-1 flex items-center justify-between gap-5 border-b border-slate-100 pb-1">
        <span className="text-slate-500">総資産</span>
        <span className="font-bold tabular-nums text-slate-900">{fmtMan(nisa + tax + cash)}円</span>
      </div>
      <div className="space-y-0.5">
        <Row c="#4f46e5" name="NISA" val={nisa} />
        <Row c="#818cf8" name="特定" val={tax} />
        <Row c="#2dd4bf" name="現金" val={cash} />
        <Row c="#f59e0b" name="教育" val={e} />
      </div>
    </div>
  );
}

const Card = ({ children, className = "" }) => (
  <div className={`rounded-2xl border border-slate-200 bg-white p-4 shadow-sm ${className}`}>{children}</div>
);

const Stat = ({ label, value, color = "text-slate-900" }) => (
  <div>
    <div className="text-[11px] text-slate-400">{label}</div>
    <div className={`text-base font-bold tabular-nums leading-tight ${color}`}>{value}</div>
  </div>
);

              <h2 className="mb-3 text-sm font-bold">NISA投資枠・税制</h2>
              <div className="space-y-3">
                <Slider label="年間NISA上限（1人）" value={nisaLimit} onChange={setNisaLimit} min={120} max={360} step={10} suffix="万円" accent="accent-indigo-600" valueColor="text-indigo-700" />
                <Slider label="生涯投資枠（1人）" value={nisaLifetimeLimit} onChange={setNisaLifetimeLimit} min={1200} max={2400} step={100} suffix="万円" accent="accent-indigo-600" valueColor="text-indigo-700" />
                <div>
                  <div className="mb-1 text-[13px] text-slate-600">年間枠超過分の自動振替（→特定口座）</div>
                  <Segmented options={["ON", "OFF"]} value={autoTransfer} onChange={setAutoTransfer} />
                </div>
                <div className="rounded-lg bg-indigo-50 px-3 py-2 text-[12px]">
                  <div className="flex justify-between"><span className="text-slate-600">生涯枠 到達目安</span><span className="font-semibold tabular-nums text-indigo-700">夫 {fullTxt(r.nisaFullAgeH)} ／ 妻 {fullTxt(r.nisaFullAgeW)}</span></div>
                  <p className="mt-1 text-[11px] text-slate-500">生涯枠（{fmtMan(nisaLifetimeLimit)}円/人）到達後は、そのNISA積立を自動で特定口座へ切替。</p>
                </div>
                <p className="text-[11px] text-slate-400">特定口座は運用益20.315%を税引後 約{r.taxEff.toFixed(1)}%で近似。NISAは非課税。</p>
              </div>
            </Card>
            <Card>
              <h2 className="mb-3 text-sm font-bold">教育・GR Supra</h2>
              <div className="space-y-3">
                <div className="space-y-2">
                  <Segmented options={["国立", "私立文系", "私立理系"]} value={uniType} onChange={setUniType} />
                  <Segmented options={["自宅", "一人暮らし"]} value={uniLiving} onChange={setUniLiving} />
                  <Slider label="教育の親上乗せ（児童手当に追加）" value={eduExtraM} onChange={setEduExtraM} min={0} max={10} step={0.5} suffix="万円" accent="accent-amber-500" valueColor="text-amber-600" />
                </div>
                <div className="space-y-3 border-t border-slate-100 pt-3">
                  <Slider label="GR Supra 目標額" value={supraGoal} onChange={setSupraGoal} min={300} max={1000} step={50} suffix="万円" accent="accent-rose-500" valueColor="text-rose-600" />
                  <Slider label="Supra 月積立" value={supraM} onChange={setSupraM} min={0} max={15} step={0.5} suffix="万円" accent="accent-rose-500" valueColor="text-rose-600" />
                </div>
              </div>
            </Card>
            <Card className={cashDip ? "bg-amber-50" : "bg-emerald-50"}>
              <div className="flex items-center justify-between">
                <div>
                  <div className="text-[11px] text-slate-500">毎月の現金繰越（現在の家計ベース）</div>
                  <div className="text-[13px] text-slate-600">収支 {fmtMan(r.monthlyNet)}円 − 投資 {fmtMan(r.monthlyNet - r.monthlyToCash)}円</div>
                </div>
                <div className={`text-lg font-bold tabular-nums ${cashDip ? "text-rose-600" : "text-emerald-700"}`}>
                  {cashDip ? `${fmtMan(-r.monthlyToCash)}円 不足` : `+${fmtMan(r.monthlyToCash)}円`}
                </div>
              </div>
              <p className="mt-1.5 text-[11px] text-slate-400">余剰は自動で現金へ。投資が収支を超えると現金を取り崩します。</p>
            </Card>
          </div>
        )}

        {tab === "運用" && (
          <div className="space-y-3">
            <Card>
              <h2 className="mb-3 text-sm font-bold">相場シナリオ</h2>
              <Segmented options={["悲観", "標準", "楽観"]} value={scenario} onChange={setScenario} />
              <p className="mt-2 text-[11px] text-slate-400">実効利回り：夫 {r.hEff.toFixed(1)}% ／ 妻 {r.wEff.toFixed(1)}%</p>
            </Card>
            <Card>
              <h2 className="mb-3 text-sm font-bold">取り崩し・目標</h2>
              <div className="space-y-3">
                <Slider label="取り崩し開始（リタイア）年齢" value={retireAge} onChange={setRetireAge} min={50} max={70} step={1} suffix="歳" accent="accent-slate-600" valueColor="text-slate-700" />
                <Slider label="リタイア後の年間生活費（今日の価値）" value={annualLiving} onChange={setAnnualLiving} min={120} max={600} step={10} suffix="万円" accent="accent-slate-600" valueColor="text-slate-700" />
                <Slider label="側FIRE目標額（50歳）" value={fireTarget} onChange={setFireTarget} min={2000} max={8000} step={100} suffix="万円" accent="accent-slate-600" valueColor="text-slate-700" />
              </div>
              <p className="mt-2 text-[11px] text-slate-400">取り崩し額＝生活費−年金（インフレ後）。</p>
            </Card>
            <Card>
              <h2 className="mb-3 text-sm font-bold">年金</h2>
              <div className="grid grid-cols-1 gap-3 sm:grid-cols-2">
                <Slider label="夫 受給開始年齢" value={hPensionAge} onChange={setHPensionAge} min={60} max={75} step={1} suffix="歳" accent="accent-emerald-600" valueColor="text-emerald-700" />
                <Slider label="妻 受給開始年齢" value={wPensionAge} onChange={setWPensionAge} min={60} max={75} step={1} suffix="歳" accent="accent-emerald-600" valueColor="text-emerald-700" />
                <Slider label="夫 65歳基準の年額" value={hPension} onChange={setHPension} min={0} max={300} step={10} suffix="万円" accent="accent-emerald-600" valueColor="text-emerald-700" />
                <Slider label="妻 65歳基準の年額" value={wPension} onChange={setWPension} min={0} max={300} step={10} suffix="万円" accent="accent-emerald-600" valueColor="text-emerald-700" />
              </div>
              <p className="mt-2 text-[11px] text-slate-400">繰上げ −0.4%/月・繰下げ +0.7%/月。実受給額：夫 {fmtMan(r.hPensionAdj)}円 ／ 妻 {fmtMan(r.wPensionAdj)}円。</p>
            </Card>
            <Card>
              <h2 className="mb-3 text-sm font-bold">インフレ</h2>
              <Slider label="年間インフレ率" value={infl} onChange={setInfl} min={0} max={5} step={0.1} suffix="%" accent="accent-orange-500" valueColor="text-orange-600" />
              <p className="mt-2 text-[11px] text-slate-400">生活費・大学費用・育児費を毎年複利で上昇。年金は据え置き。表示は名目額。</p>
            </Card>
          </div>
        )}

        <section className="mt-4 rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
          <div className="mb-1 flex items-center justify-between">
            <h2 className="text-sm font-bold">資産の推移（{age}→90歳）</h2>
            <span className="text-[11px] text-slate-400">単位：万円</span>
          </div>
          <div className="h-72 w-full">
            <ResponsiveContainer width="100%" height="100%">
              <ComposedChart data={r.data} margin={{ top: 8, right: 6, left: -8, bottom: 0 }}>
                <defs>
                  <linearGradient id="gNisa" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#4f46e5" stopOpacity={0.85} /><stop offset="100%" stopColor="#4f46e5" stopOpacity={0.55} /></linearGradient>
                  <linearGradient id="gTax" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#818cf8" stopOpacity={0.8} /><stop offset="100%" stopColor="#818cf8" stopOpacity={0.5} /></linearGradient>
                  <linearGradient id="gCash" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor="#2dd4bf" stopOpacity={0.8} /><stop offset="100%" stopColor="#2dd4bf" stopOpacity={0.45} /></linearGradient>
                </defs>
                <CartesianGrid strokeDasharray="3 3" stroke="#eef2f7" vertical={false} />
                <XAxis dataKey="age" tick={{ fontSize: 11, fill: "#94a3b8" }} tickLine={false} axisLine={{ stroke: "#e2e8f0" }} ticks={ticks} />
                <YAxis tick={{ fontSize: 11, fill: "#94a3b8" }} tickLine={false} axisLine={false} width={48} tickFormatter={(v) => (v >= 10000 ? `${(v / 10000).toFixed(1)}億` : v.toLocaleString())} />
                <Tooltip content={<ChartTooltip />} />
                <Area type="monotone" dataKey="nisa" stackId="a" stroke="#4f46e5" strokeWidth={1} fill="url(#gNisa)" />
                <Area type="monotone" dataKey="tax" stackId="a" stroke="#818cf8" strokeWidth={1} fill="url(#gTax)" />
                <Area type="monotone" dataKey="cash" stackId="a" stroke="#2dd4bf" strokeWidth={1} fill="url(#gCash)" />
                <Line type="monotone" dataKey="education" stroke="#f59e0b" strokeWidth={2.5} dot={false} />
                <ReferenceLine y={fireTarget} stroke="#64748b" strokeDasharray="5 4" strokeWidth={1.5} label={{ value: `側FIRE目標 ${fmtMan(fireTarget)}`, position: "insideTopRight", fontSize: 10, fill: "#64748b" }} />
                <ReferenceLine x={retireAge} stroke="#0f172a" strokeDasharray="4 3" strokeWidth={1.5} label={{ value: "取り崩し開始", position: "insideTopLeft", fontSize: 10, fill: "#0f172a" }} />
              </ComposedChart>
            </ResponsiveContainer>
          </div>
          <div className="mt-1 flex flex-wrap gap-x-4 gap-y-1 text-[11px] text-slate-500">
            <span className="flex items-center gap-1.5"><span className="h-2 w-3 rounded-sm bg-indigo-600" /> NISA</span>
            <span className="flex items-center gap-1.5"><span className="h-2 w-3 rounded-sm bg-indigo-400" /> 特定</span>
            <span className="flex items-center gap-1.5"><span className="h-2 w-3 rounded-sm bg-teal-400" /> 現金</span>
            <span className="flex items-center gap-1.5"><span className="h-1 w-3 rounded-sm bg-amber-500" /> 教育</span>
          </div>
        </section>

        <section className="mt-3 grid grid-cols-1 gap-3 sm:grid-cols-2">
          <Card>
            <div className="mb-2 flex items-center gap-2"><Dot color="#4f46e5" /><h3 className="text-sm font-bold">老後 / FIRE</h3></div>
            <div className="text-2xl font-bold tabular-nums leading-none">{fmtMan(r.assets50)}円</div>
            <div className="mt-0.5 text-[11px] text-slate-400">50歳・総資産（今の価値で約{fmtMan(r.realAssets50)}円）</div>
            <div className="mt-3 space-y-1 border-t border-slate-100 pt-2 text-[13px]">
              <div className="flex justify-between"><span className="text-slate-500">NISA / 特定</span><span className="font-semibold tabular-nums">{fmtMan(c50.nisa)} / {fmtMan(c50.tax)}</span></div>
              <div className="flex justify-between"><span className="text-slate-500">現金</span><span className="font-semibold tabular-nums">{fmtMan(c50.cash)}</span></div>
            </div>
            <div className={`mt-3 rounded-lg px-2.5 py-1.5 text-center text-[12px] font-semibold ${fireOk ? "bg-emerald-50 text-emerald-700" : "bg-amber-50 text-amber-700"}`}>
              {fireOk ? "側FIRE目標を達成" : `目標まで あと${fmtMan(fireTarget - r.assets50)}円`}
            </div>
          </Card>

          <Card>
            <div className="mb-2 flex items-center gap-2"><Dot color="#818cf8" /><h3 className="text-sm font-bold">口座別の残高</h3></div>
            <table className="w-full text-[12px]">
              <thead><tr className="text-slate-400"><th className="pb-1 text-left font-medium"> </th><th className="pb-1 text-right font-medium">NISA</th><th className="pb-1 text-right font-medium">特定</th></tr></thead>
              <tbody className="tabular-nums">
                <tr><td className="py-0.5 text-slate-500">現在</td><td className="py-0.5 text-right font-semibold">{fmtMan(curNisa)}</td><td className="py-0.5 text-right font-semibold">{fmtMan(curTax)}</td></tr>
                <tr><td className="py-0.5 text-slate-500">50歳</td><td className="py-0.5 text-right font-semibold">{fmtMan(c50.nisa)}</td><td className="py-0.5 text-right font-semibold">{fmtMan(c50.tax)}</td></tr>
                <tr><td className="py-0.5 text-slate-500">退職({retireAge}歳)</td><td className="py-0.5 text-right font-semibold">{fmtMan(cRet.nisa)}</td><td className="py-0.5 text-right font-semibold">{fmtMan(cRet.tax)}</td></tr>
                <tr><td className="py-0.5 text-slate-500">90歳</td><td className="py-0.5 text-right font-semibold">{fmtMan(c90.nisa)}</td><td className="py-0.5 text-right font-semibold">{fmtMan(c90.tax)}</td></tr>
              </tbody>
            </table>
            <p className="mt-2 text-[11px] text-slate-400">生涯枠到達後はNISA拠出停止→特定へ。取り崩しは現金→特定→NISAの順。</p>
          </Card>

          <Card>
            <div className="mb-2 flex items-center gap-2"><Dot color="#0f172a" /><h3 className="text-sm font-bold">資産寿命</h3></div>
            <div className={`text-2xl font-bold tabular-nums leading-none ${lasts ? "text-emerald-600" : "text-amber-600"}`}>{lasts ? "90歳でも持続" : `${r.depletionAge}歳で枯渇`}</div>
            <div className="mt-0.5 text-[11px] text-slate-400">{lasts ? `90歳残高 ${fmtMan(r.balance90)}円` : "取り崩しが上回ります"}</div>
            <div className="mt-3 space-y-1 border-t border-slate-100 pt-2 text-[13px]">
              <div className="flex justify-between"><span className="text-slate-500">退職時 資産</span><span className="font-semibold tabular-nums">{fmtMan((cRet.nisa || 0) + (cRet.tax || 0) + (cRet.cash || 0))}円</span></div>
              <div className="flex justify-between"><span className="text-slate-500">年金（調整後・夫＋妻）</span><span className="font-semibold tabular-nums">{fmtMan(r.hPensionAdj + r.wPensionAdj)}円</span></div>
            </div>
          </Card>

          <Card>
            <div className="mb-2 flex items-center gap-2"><Dot color="#f59e0b" /><h3 className="text-sm font-bold">教育</h3></div>
            <div className={`text-2xl font-bold tabular-nums leading-none ${eduOk ? "text-emerald-600" : "text-rose-600"}`}>{eduOk ? "+" : "−"}{fmtMan(Math.abs(r.eduGap))}円</div>
            <div className="mt-0.5 text-[11px] text-slate-400">過不足（18歳時・インフレ後）</div>
            <div className="mt-3 space-y-2 border-t border-slate-100 pt-3">
              <div>
                <div className="mb-0.5 flex justify-between text-[12px]"><span className="text-slate-500">運用残高</span><span className="font-semibold tabular-nums">{fmtMan(r.eduAt18)}円</span></div>
                <div className="h-2 w-full overflow-hidden rounded-full bg-slate-100"><div className="h-full rounded-full bg-amber-400" style={{ width: `${(r.eduAt18 / eduBarMax) * 100}%` }} /></div>
              </div>
              <div>
                <div className="mb-0.5 flex justify-between text-[12px]"><span className="text-slate-500">必要額（インフレ後）</span><span className="font-semibold tabular-nums">{fmtMan(r.uniCost)}円</span></div>
                <div className="h-2 w-full overflow-hidden rounded-full bg-slate-100"><div className="h-full rounded-full bg-slate-400" style={{ width: `${(r.uniCost / eduBarMax) * 100}%` }} /></div>
              </div>
            </div>
          </Card>

          <Card>
            <div className="mb-2 flex items-center gap-2"><Dot color="#e11d48" /><h3 className="text-sm font-bold">GR Supra</h3></div>
            <div className="text-2xl font-bold tabular-nums leading-none text-rose-600">{r.supraDone && r.supraAge === age ? "達成済み" : r.supraAge ? `${r.supraAge}歳で達成` : "目標未達"}</div>
            <div className="mt-0.5 text-[11px] text-slate-400">目標 {fmtMan(supraGoal)}円</div>
            <div className="mt-3 border-t border-slate-100 pt-3">
              <div className="mb-0.5 flex justify-between text-[12px]"><span className="text-slate-500">現在の達成率</span><span className="font-semibold tabular-nums">{r.supraPct.toFixed(0)}%</span></div>
              <div className="h-2 w-full overflow-hidden rounded-full bg-slate-100"><div className="h-full rounded-full bg-rose-400" style={{ width: `${r.supraPct}%` }} /></div>
            </div>
          </Card>

          <Card className={cashShort ? "border-rose-200 bg-rose-50" : ""}>
            <div className="mb-2 flex items-center gap-2"><Dot color="#0d9488" /><h3 className="text-sm font-bold">育児・育休</h3></div>
            <div className={`text-2xl font-bold tabular-nums leading-none ${cashShort ? "text-rose-600" : "text-teal-700"}`}>{cashShort ? `現金 ${fmtMan(r.minCashChild)}円` : `最低現金 ${fmtMan(r.minCashChild)}円`}</div>
            <div className="mt-0.5 text-[11px] text-slate-400">{cashShort ? "育児期に現金が不足します" : "育児期の現金の谷（CF反映済み）"}</div>
            <div className="mt-3 space-y-1 border-t border-slate-100 pt-2 text-[13px]">
              <div className="flex justify-between"><span className="text-slate-500">育休の収入減（概算）</span><span className="font-semibold tabular-nums">{fmtMan(r.leaveLoss)}円</span></div>
              <div className="flex justify-between"><span className="text-slate-500">育児ランニング(0〜6歳)</span><span className="font-semibold tabular-nums">約{fmtMan(r.runningTotal)}円</span></div>
            </div>
            {cashShort && <p className="mt-2 text-[11px] font-medium text-rose-600">育休中は積立を一時的に下げるか、防衛資金を厚めに。</p>}
          </Card>
        </section>

        <footer className="mt-5 rounded-2xl bg-slate-50 p-4 text-[11px] leading-relaxed text-slate-500">
          <p className="mb-1 font-semibold text-slate-600">前提</p>
          <p>
            子1人を現在＋2年で出産／毎月の余剰を現金へ繰越（不足は現金から）／給与・賞与は昇給率で上昇し、給与停止年齢で各自ゼロ（賞与は在職者数で按分）／育休中は妻の収入が67%→50%／児童手当＋親上乗せを運用／特定口座は運用益20.315%を税引後利回りで近似、NISAは年間枠＋生涯枠まで（生涯枠到達後は自動で特定へ）／取り崩しは「生活費−年金」を現金→特定→NISAの順／年金は65歳基準で繰上げ−0.4%・繰下げ+0.7%/月・据え置き／生活費・大学費用・育児費はインフレで上昇。数値は概算で、投資助言ではありません。
          </p>
        </footer>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
